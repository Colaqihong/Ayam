<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Latihan Menulis - Ayam</title>
<style>
body { font-family: Arial; background: linear-gradient(to bottom, #a8e6cf, #dcedc1); text-align:center; padding:30px; }
.container { max-width:700px; margin:auto; background:#ffffffee; padding:25px; border-radius:15px; }
.word { font-size:50px; font-weight:bold; }
.trace-area { position:relative; width:420px; height:100px; margin:30px auto; }
.trace-guide { position:absolute; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:56px; font-weight:bold; letter-spacing:6px; color:transparent; -webkit-text-stroke:2px #999; }
#traceCanvas { position:absolute; width:420px; height:100px; border:1px dashed #ccc; }
.image-box img { width:200px; border-radius:12px; }
button { padding:12px; margin:10px; border-radius:8px; border:none; }
.check-btn { background:#4CAF50;color:white; }
.clear-btn { background:#E74C3C;color:white; }
.result { font-size:28px; }
</style>
</head>
<body>
<h1>Latihan Menulis 🐔</h1>
<div class="word">AYAM</div>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Chicken_sitting.jpg">
<div class="trace-area">
<div class="trace-guide">AYAM</div>
<canvas id="traceCanvas" width="420" height="100"></canvas>
</div>
<button class="check-btn" onclick="checkWriting()">Semak</button>
<button class="clear-btn" onclick="clearCanvas()">Kosongkan</button>
<div id="result" class="result"></div>

<script>
const canvas=document.getElementById("traceCanvas");
const ctx=canvas.getContext("2d");
let drawing=false,totalLength=0,lastX=0,lastY=0;
ctx.lineWidth=4;

function draw(x,y){let dx=x-lastX,dy=y-lastY;totalLength+=Math.sqrt(dx*dx+dy*dy);ctx.lineTo(x,y);ctx.stroke();lastX=x;lastY=y;}
canvas.onmousedown=e=>{drawing=true;lastX=e.offsetX;lastY=e.offsetY;ctx.beginPath();ctx.moveTo(lastX,lastY);}
canvas.onmousemove=e=>{if(drawing)draw(e.offsetX,e.offsetY);}
canvas.onmouseup=()=>drawing=false;

function clearCanvas(){ctx.clearRect(0,0,420,100);totalLength=0;result.innerHTML="";}

const successAudio=new Audio('button-37a.mp3');
const failAudio=new Audio('beep-03.mp3');

function checkWriting(){
if(totalLength>900){result.innerHTML="Bagus! 🎉";successAudio.play();}
else{result.innerHTML="Cuba lagi 😢";failAudio.play();}
}
</script>
</body>
</html>
