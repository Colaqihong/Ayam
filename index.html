<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Writing Practice - Chicken</title>
<style>
body { font-family: Arial; background: linear-gradient(to bottom, #a8e6cf, #dcedc1); text-align:center; padding:30px; }
.container { max-width:700px; margin:auto; background:#ffffffee; padding:25px; border-radius:15px; }
.word { font-size:50px; font-weight:bold; }
.trace-area { position:relative; width:420px; height:100px; margin:30px auto; }
.trace-guide { position:absolute; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:56px; font-weight:bold; letter-spacing:6px; color:transparent; -webkit-text-stroke:2px #999; }
#traceCanvas { position:absolute; width:420px; height:100px; border:1px dashed #ccc; }
button { padding:12px 20px; margin:10px; border-radius:8px; border:none; }
.check-btn { background:#4CAF50;color:white; }
.clear-btn { background:#E74C3C;color:white; }
.result { font-size:28px; }
</style>
</head>
<body>
<div class="container">
<h1>Writing Practice 🐔</h1>

<div class="word">CHICKEN</div>

<img src="https://images.unsplash.com/photo-1589927986089-35812388d1f4?q=80&w=400">

<div class="trace-area">
<div class="trace-guide">CHICKEN</div>
<canvas id="traceCanvas" width="420" height="100"></canvas>
</div>

<button class="check-btn" onclick="checkWriting()">Check</button>
<button class="clear-btn" onclick="clearCanvas()">Clear</button>

<div id="result" class="result"></div>
</div>

<script>
const canvas=document.getElementById("traceCanvas");
const ctx=canvas.getContext("2d");
let drawing=false,totalLength=0,lastX=0,lastY=0;
ctx.lineWidth=4; ctx.lineCap="round";

function draw(x,y){
let dx=x-lastX,dy=y-lastY;
totalLength+=Math.sqrt(dx*dx+dy*dy);
ctx.lineTo(x,y);
ctx.stroke();
lastX=x; lastY=y;
}

canvas.onmousedown=e=>{
drawing=true;
lastX=e.offsetX; lastY=e.offsetY;
ctx.beginPath();
ctx.moveTo(lastX,lastY);
};

canvas.onmousemove=e=>{
if(drawing) draw(e.offsetX,e.offsetY);
};

canvas.onmouseup=()=>drawing=false;

function clearCanvas(){
ctx.clearRect(0,0,420,100);
totalLength=0;
result.innerHTML="";
}

const successAudio=new Audio('button-37a.mp3');
const failAudio=new Audio('beep-03.mp3');

function checkWriting(){
if(totalLength>900){
result.innerHTML="Well done! 🎉";
successAudio.play();
}else{
result.innerHTML="Try again 😢";
failAudio.play();
}
}
</script>
</body>
</html>
